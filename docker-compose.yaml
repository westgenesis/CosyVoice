version: '3'

services:
  cosyvoice:
    image: cosyvoice:v0.1
    volumes:
      - ./pretrained_models:/opt/CosyVoice/pretrained_models
      - ./cache:/root/.cache
    container_name: cosyvoice
    ports:
      - "50000:50000"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    command:
      - "python"
      - "runtime/python/fastapi/server.py"
      - "--model_dir=pretrained_models/CosyVoice2-0.5B"
    restart: unless-stopped